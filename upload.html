<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คลังอัปโหลดไฟล์ระบบ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.45);
            --ios-sidebar: rgba(20, 20, 22, 0.65);
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-amber: #FF9F0A;
            --ios-red: #FF453A;
            --text-main: #FFFFFF;
            --text-sub: #8E8E93;
            --blur-val: 30px;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 10%, #1c1c1e 0%, #000000 70%);
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* ปุ่มเปิด Sidebar */
        .sidebar-toggle {
            position: fixed;
            top: 25px;
            left: 25px;
            background: var(--ios-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            color: var(--ios-blue);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }

        .sidebar-toggle:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        /* Sidebar สไตล์ iOS Liquid Glass */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--ios-sidebar);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border-right: 1px solid var(--border-color);
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 90px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.active {
            transform: translateX(280px);
        }

        /* Overlay ฉากหลังเวลาเปิด Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 998;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        .sidebar-brand {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            padding-left: 10px;
            border-left: 3px solid var(--ios-blue);
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .sidebar-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .sidebar-item a:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-item.active a {
            background: rgba(10, 132, 255, 0.15);
            color: var(--ios-blue);
        }

        .sidebar-item a i {
            width: 20px;
            text-align: center;
            font-size: 1.05rem;
        }

        /* ดีไซน์ Liquid Glass Card */
        .glass-container {
            background: var(--ios-card);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            margin-top: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 5px;
        }

        .header i {
            font-size: 3rem;
            color: var(--ios-blue);
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(10, 132, 255, 0.5);
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-sub);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 6px;
            font-weight: 500;
            padding-left: 4px;
        }

        /* Input สไตล์ iOS Glass */
        .ios-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.25s ease;
            outline: none;
        }

        .ios-input:focus {
            border-color: var(--ios-blue);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(10, 132, 255, 0.2);
        }

        /* โซนลากวางอัปโหลดไฟล์ */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 20px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--ios-blue);
            background: rgba(10, 132, 255, 0.05);
        }

        .upload-area i {
            font-size: 2.2rem;
            color: var(--text-sub);
            margin-bottom: 10px;
            transition: color 0.25s;
        }

        .upload-area:hover i {
            color: var(--ios-blue);
        }

        .upload-area p {
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .upload-area span {
            font-size: 0.75rem;
            color: var(--text-sub);
            display: block;
            margin-top: 4px;
        }

        #fileInput {
            display: none;
        }

        /* Progress Bar สไตล์ iOS */
        .progress-container {
            display: none;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--ios-blue);
            border-radius: 3px;
            transition: width 0.1s ease;
        }

        /* ปุ่มกด Action */
        .ios-btn {
            width: 100%;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .ios-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .ios-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-sub);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* บาร์แสดงสถานะการทำงาน */
        .status-box {
            margin-top: 18px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        .status-box.loading {
            display: flex;
            background: rgba(10, 132, 255, 0.1);
            border: 1px solid rgba(10, 132, 255, 0.2);
            color: var(--ios-blue);
        }

        .status-box.success {
            display: flex;
            background: rgba(48, 209, 88, 0.1);
            border: 1px solid rgba(48, 209, 88, 0.2);
            color: var(--ios-green);
        }

        .status-box.error {
            display: flex;
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.2);
            color: var(--ios-red);
        }

        /* ส่วนของประวัติการอัปโหลด */
        .history-section {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .history-title {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-history-btn {
            background: none;
            border: none;
            color: var(--ios-red);
            font-size: 0.75rem;
            cursor: pointer;
        }
        .history-list {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .history-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 80%;
        }
        .history-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-meta {
            font-size: 0.7rem;
            color: var(--text-sub);
        }
        .history-link {
            color: var(--ios-blue);
            font-size: 1rem;
            text-decoration: none;
            padding: 4px;
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <button class="sidebar-toggle" id="sidebarToggle" title="เปิดเมนู">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">แผงควบคุมระบบ</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="index.html">
                    <i class="fa-solid fa-house"></i> หน้าหลัก (Index)
                </a>
            </li>
            <li class="sidebar-item active">
                <a href="#">
                    <i class="fa-solid fa-cloud-arrow-up"></i> คลังอัปโหลดไฟล์
                </a>
            </li>
        </ul>
    </nav>

    <div class="glass-container">
        <div class="header">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <h1>คลังอัปโหลดไฟล์ระบบ</h1>
            <p>ส่งข้อมูลไปยัง GitHub Pages โดยตรง</p>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-user-gear"></i> GitHub Username</label>
            <input type="text" id="username" class="ios-input" placeholder="เช่น the-genesis" value="the-genesis">
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-code-branch"></i> Repository Name</label>
            <input type="text" id="repo" class="ios-input" placeholder="ชื่อคลังเก็บโค้ดของคุณ">
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-key"></i> GitHub Token (PAT)</label>
            <input type="password" id="token" class="ios-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxx">
        </div>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-file-code" id="fileIcon"></i>
            <p id="fileText">เลือกไฟล์ หรือลากมาวางที่นี่</p>
            <span id="fileSize">รองรับไฟล์ข้อมูลทุกประเภท</span>
            <input type="file" id="fileInput">
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-info">
                <span id="progressFileName" style="max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">ไฟล์: -</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>

        <button id="uploadBtn" class="ios-btn" disabled>
            <i class="fa-solid fa-paper-plane"></i> เริ่มส่งไฟล์ขึ้นคลังระบบ
        </button>

        <div id="statusBox" class="status-box">
            <i id="statusIcon" class="fa-solid"></i>
            <span id="statusText">กำลังจัดเตรียมข้อความ...</span>
        </div>

        <div class="history-section">
            <div class="history-title">
                <span><i class="fa-solid fa-clock-rotate-left"></i> ประวัติการอัปโหลด</span>
                <button class="clear-history-btn" id="clearHistoryBtn">ล้างประวัติ</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // เอนทิตีและการควบคุม Sidebar
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
            const isOpen = sidebar.classList.contains('active');
            sidebarToggle.innerHTML = isOpen ? `<i class="fa-solid fa-xmark"></i>` : `<i class="fa-solid fa-bars"></i>`;
        }

        sidebarToggle.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // ตัวแปรการอัปโหลดหลัก
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileText = document.getElementById('fileText');
        const fileSize = document.getElementById('fileSize');
        const fileIcon = document.getElementById('fileIcon');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        
        const progressContainer = document.getElementById('progressContainer');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressFileName = document.getElementById('progressFileName');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let selectedFile = null;

        if(localStorage.getItem('gh_user')) document.getElementById('username').value = localStorage.getItem('gh_user');
        if(localStorage.getItem('gh_repo')) document.getElementById('repo').value = localStorage.getItem('gh_repo');
        if(localStorage.getItem('gh_token')) document.getElementById('token').value = localStorage.getItem('gh_token');

        renderHistory();

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); }, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if(files.length > 0) handleFileSelection(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) handleFileSelection(e.target.files[0]);
        });

        function handleFileSelection(file) {
            selectedFile = file;
            fileText.innerText = file.name;
            fileSize.innerText = (file.size / 1024).toFixed(2) + ' KB';
            fileIcon.className = "fa-solid fa-file-shield";
            fileIcon.style.color = "var(--ios-green)";
            uploadBtn.disabled = false;
            showStatus(null);
            
            progressContainer.style.display = "none";
            progressBarFill.style.width = "0%";
            progressPercent.innerText = "0%";
        }

        // ฟังก์ชันเจนชื่อไฟล์แบบ YYMMDD ตามวันที่ปัจจุบัน
function generateTimestampName(originalName) {
    const now = new Date();
    const yy = String(now.getFullYear()).slice(-2); // ได้ "26"
    const mm = String(now.getMonth() + 1).padStart(2, '0'); // ได้ "06"
    const dd = String(now.getDate()).padStart(2, '0'); // ได้ "11"
    
    // ดึงเฉพาะนามสกุลไฟล์เดิม เช่น .ipa
    const extension = originalName.substring(originalName.lastIndexOf('.'));
    
    return `${yy}${mm}${dd}${extension}`; // ผลลัพธ์: 260611.ipa
        }

        function showStatus(type, message) {
            statusBox.className = "status-box";
            if (!type) { statusBox.style.display = "none"; return; }
            
            statusBox.style.display = "flex";
            statusBox.classList.add(type);
            statusText.innerText = message;
            
            if (type === 'loading') {
                statusIcon.className = "fa-solid fa-spinner spinner";
            } else if (type === 'success') {
                statusIcon.className = "fa-solid fa-circle-check";
            } else if (type === 'error') {
                statusIcon.className = "fa-solid fa-circle-exclamation";
            }
        }

        function updateProgress(percent, targetName) {
            progressContainer.style.display = "block";
            progressFileName.innerText = `จัดเตรียม: ${targetName} (${(selectedFile.size / 1024).toFixed(2)} KB)`;
            progressBarFill.style.width = percent + "%";
            progressPercent.innerText = percent + "%";
        }

        function saveToHistory(filename, size, owner, repo) {
            let history = JSON.parse(localStorage.getItem('upload_history')) || [];
            const timeString = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            const dateString = new Date().toLocaleDateString('th-TH', {day: 'numeric', month: 'short'});
            
            const newItem = {
                name: filename,
                size: size,
                time: `${dateString} | ${timeString}`,
                url: `https://${owner}.github.io/${repo}/${filename}`
            };
            
            history.unshift(newItem);
            localStorage.setItem('upload_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('upload_history')) || [];
            historyList.innerHTML = "";
            
            if(history.length === 0) {
                historyList.innerHTML = `<div style="text-align:center; color:var(--text-sub); font-size:0.8rem; padding: 15px;">ไม่มีประวัติการอัปโหลด</div>`;
                return;
            }

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = "history-item";
                div.innerHTML = `
                    <div class="history-info">
                        <span class="history-name" title="${item.name}">${item.name}</span>
                        <span class="history-meta">${item.size} • ${item.time}</span>
                    </div>
                    <a href="${item.url}" target="_blank" class="history-link" title="เปิดดูลิงก์ Pages">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                `;
                historyList.appendChild(div);
            });
        }

        clearHistoryBtn.addEventListener('click', () => {
            if(confirm('คุณต้องการลบประวัติการอัปโหลดทั้งหมดใช่หรือไม่?')) {
                localStorage.removeItem('upload_history');
                renderHistory();
            }
        });

        // ฟังก์ชันหลักสำหรับการลบไฟล์เดิม (ถ้ามี) และอัปโหลดไฟล์ที่มีการเปลี่ยนชื่อใหม่
        uploadBtn.addEventListener('click', async () => {
            const owner = document.getElementById('username').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const token = document.getElementById('token').value.trim();

            if (!owner || !repo || !token || !selectedFile) {
                showStatus('error', 'กรุณากรอกข้อมูลระบบควบคุมให้ครบถ้วน');
                return;
            }

            localStorage.setItem('gh_user', owner);
            localStorage.setItem('gh_repo', repo);
            localStorage.setItem('gh_token', token);

            // เจนชื่อไฟล์ใหม่ตามเวลาปัจจุบัน
            const newFileName = generateTimestampName(selectedFile.name);

            showStatus('loading', 'กำลังแปลงโครงสร้างไฟล์เป็น Base64...');
            uploadBtn.disabled = true;
            updateProgress(10, newFileName);

            const reader = new FileReader();
            reader.readAsDataURL(selectedFile);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                const path = newFileName; // ใช้ชื่อใหม่ที่ตั้งตามวันเวลาในการอัปโหลด
                const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

                updateProgress(30, newFileName);
                showStatus('loading', 'กำลังตรวจสอบไฟล์เดิมบนเซิร์ฟเวอร์...');
                
                let sha = null;
                try {
                    const checkResponse = await fetch(url, {
                        method: 'GET',
                        headers: { 'Authorization': `token ${token}` }
                    });
                    if (checkResponse.ok) {
                        const checkData = await checkResponse.json();
                        sha = checkData.sha;
                    }
                } catch (err) { /* ไม่เจอไฟล์เก่า ข้ามไปได้เลย */ }

                // หากตรงกับจังหวะวิเดียวกันที่มีไฟล์ชื่อนี้อยู่แล้ว ให้ทำการลบก่อน
                if (sha) {
                    updateProgress(50, newFileName);
                    showStatus('loading', 'พบไฟล์ชื่อซ้ำ! กำลังลบไฟล์เดิมออก...');
                    
                    try {
                        const deleteResponse = await fetch(url, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `ลบไฟล์เดิมเพื่อเตรียมอัปโหลดใหม่: ${path}`,
                                sha: sha
                            })
                        });

                        if (!deleteResponse.ok) {
                            const deleteErr = await deleteResponse.json();
                            showStatus('error', `ไม่สามารถลบไฟล์เดิมได้: ${deleteErr.message}`);
                            uploadBtn.disabled = false;
                            return;
                        }
                        sha = null; 
                    } catch (error) {
                        showStatus('error', 'เครือข่ายขัดข้อง ไม่สามารถลบไฟล์เดิมได้');
                        uploadBtn.disabled = false;
                        return;
                    }
                }

                updateProgress(70, newFileName);
                showStatus('loading', 'กำลังส่งไฟล์เข้าคลังระบบด้วยชื่อใหม่...');

                // ส่งคำสั่งสร้างไฟล์ใหม่แบบคลีนๆ เข้าคลัง GitHub
                const bodyData = {
                    message: `อัปโหลดไฟล์ระบบเสร็จสิ้น (Auto-Rename): ${path}`,
                    content: base64Content
                };

                try {
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(bodyData)
                    });

                    if (response.ok) {
                        updateProgress(100, newFileName);
                        showStatus('success', 'เปลี่ยนชื่อและอัปโหลดไฟล์ใหม่สำเร็จ!');
                        
                        const sizeText = (selectedFile.size / 1024).toFixed(2) + ' KB';
                        saveToHistory(path, sizeText, owner, repo);

                        selectedFile = null;
                        fileText.innerText = "เลือกไฟล์ หรือลากมาวางที่นี่";
                        fileSize.innerText = "รองรับไฟล์ข้อมูลทุกประเภท";
                        fileIcon.className = "fa-solid fa-file-code";
                        fileIcon.style.color = "var(--text-sub)";
                    } else {
                        const errData = await response.json();
                        showStatus('error', `ปฏิเสธการอัปโหลด: ${errData.message}`);
                        uploadBtn.disabled = false;
                    }
                } catch (error) {
                    showStatus('error', 'เครือข่ายขัดข้อง ไม่สามารถติดต่อ GitHub API ได้');
                    uploadBtn.disabled = false;
                }
            };
        });
    </script>
</body>
</html>
