<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.75);
            --ios-sidebar: rgba(20, 20, 22, 0.65);
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-amber: #FF9F0A;
            --ios-red: #FF453A;
            --text-main: #FFFFFF;
            --text-sub: #8E8E93;
            --blur-val: 30px;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 60px 16px 24px 16px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 10%, #1c1c1e 0%, #000000 70%);
        }

        /* 🍔 ปุ่มเปิด/ปิด Sidebar */
        .sidebar-toggle {
            position: fixed;
            top: 25px;
            left: 25px;
            background: rgba(28, 28, 30, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            color: var(--ios-blue);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }

        .sidebar-toggle:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        /* 📱 Sidebar Menu สไตล์ iOS Glassmorphism */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--ios-sidebar);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border-right: 1px solid var(--border-color);
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 90px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.active {
            transform: translateX(280px);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 998;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        .sidebar-brand {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            padding-left: 10px;
            border-left: 3px solid var(--ios-blue);
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .sidebar-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .sidebar-item a:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-item.active a {
            background: rgba(10, 132, 255, 0.15);
            color: var(--ios-blue);
        }

        .sidebar-item a i {
            width: 20px;
            text-align: center;
            font-size: 1.05rem;
        }

        /* 📱 โครงสร้างแบบ iOS App Container */
        .app-container {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(135deg, #1c1c1e 0%, #0c0c0e 100%);
            border-radius: 38px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: appAppear 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appAppear {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 🕒 โซนแสดง วัน เดือน ปี และเวลาปัจจุบันของแอป */
        .time-ticker {
            font-size: 11px;
            color: var(--ios-blue);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(10, 132, 255, 0.08);
            padding: 6px 12px;
            border-radius: 8px;
            width: fit-content;
        }

        /* Header UI */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-title {
            position: relative;
            min-width: 180px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            line-height: 1.3;
        }

        /* Skeleton Screen Block */
        .skeleton-block {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
        }

        .skeleton-line {
            background: linear-gradient(90deg, #2c2c2e 25%, #3a3a3c 50%, #2c2c2e 75%);
            background-size: 200% 100%;
            border-radius: 6px;
            animation: shimmerEffect 1.4s infinite linear;
        }

        .skeleton-title { width: 140px; height: 22px; margin-bottom: 6px; }
        .skeleton-sub { width: 120px; height: 13px; }

        @keyframes shimmerEffect {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .is-loading .real-content { opacity: 0; }
        .is-loading .skeleton-block { display: block; }

        /* Status Pill */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(142, 142, 147, 0.15);
            color: var(--text-sub);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(142, 142, 147, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .status-pill:active {
            transform: scale(0.95);
        }

        /* iOS Form Group */
        .ios-list {
            background: var(--ios-card);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border-radius: 14px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ios-row {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ios-row:last-child {
            border-bottom: none;
        }

        .ios-row label {
            font-size: 12px;
            font-weight: 600;
            color: var(--ios-blue);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .input-group-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .ios-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            padding: 4px 0;
            outline: none;
        }

        .ios-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .ios-textarea {
            height: 75px;
            resize: none;
        }

        .input-action-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: var(--ios-blue);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }

        .input-action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .input-action-btn:active {
            transform: scale(0.95);
        }

        /* iOS Action Button */
        .ios-btn {
            width: 100%;
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.25);
        }

        .ios-btn:active {
            transform: scale(0.97);
            background: #0071e3;
        }

        /* 🔄 Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 12, 14, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 38px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .ios-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--ios-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Status Toast Alert */
        .toast-status {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            padding: 12px;
            border-radius: 12px;
            opacity: 0;
            transform: translateY(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast-status.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <button class="sidebar-toggle" id="sidebarToggle" title="เปิดเมนู">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">แผงควบคุมระบบ</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item active">
                <a href="#">
                    <i class="fa-solid fa-house"></i> หน้าหลัก (Control Panel)
                </a>
            </li>
            <li class="sidebar-item">
                <a href="upload.html">
                    <i class="fa-solid fa-cloud-arrow-up"></i> คลังอัปโหลดไฟล์
                </a>
            </li>
        </ul>
    </nav>

<div class="app-container">
    
    <div id="loadingOverlay" class="loading-overlay">
        <div class="ios-spinner"></div>
        <div id="loadingText" class="loading-text">กำลังซิงค์ข้อมูล...</div>
    </div>

    <div class="time-ticker">
        <i class="fa-regular fa-calendar-days"></i> <span id="liveClock">กำลังโหลดเวลา...</span>
    </div>

    <div class="app-header">
        <div id="headerTitleArea" class="header-title">
            <div class="real-content">
                <h1>Control Panel</h1>
                <p><i class="fa-solid fa-cloud-upload"></i> <span id="syncTimeText">ยังไม่มีประวัติการบันทึก</span></p>
            </div>
            <div class="skeleton-block">
                <div class="skeleton-line skeleton-title"></div>
                <div class="skeleton-line skeleton-sub"></div>
            </div>
        </div>
        <div id="db_status_pill" class="status-pill" onclick="fetchCurrentConfig()">
            <i class="fa-solid fa-rotate"></i>
            <span id="db_status_text">ดึงข้อมูลล่าสุด</span>
        </div>
    </div>

    <div class="ios-list">
        <div class="ios-row">
            <label><i class="fa-solid fa-server"></i> Firebase Database URL</label>
            <div class="input-group-wrapper">
                <input type="text" id="firebase_url" class="ios-input" value="https://coffee-spark-ai-barista-ece33-default-rtdb.asia-southeast1.firebasedatabase.app" placeholder="https://your-project-id.firebasedatabase.app" onchange="fetchCurrentConfig()">
                <button type="button" class="input-action-btn" onclick="copyToClipboard('firebase_url')">
                    <i class="fa-solid fa-copy"></i> คัดลอก
                </button>
            </div>
        </div>
    </div>

    <div class="ios-list">
        <div class="ios-row">
            <label><i class="fa-solid fa-fingerprint"></i> Current Build ID</label>
            <input type="text" id="current_build_id" class="ios-input" placeholder="เช่น patch_4">
        </div>

        <div class="ios-row">
            <label><i class="fa-solid fa-code-branch"></i> Latest Version</label>
            <input type="text" id="latest_version" class="ios-input" placeholder="เช่น 1.0.3">
        </div>

        <div class="ios-row">
            <label><i class="fa-solid fa-envelope-open-text"></i> Message announcement</label>
            <textarea id="message" class="ios-input ios-textarea" placeholder="พิมพ์ข้อความประกาศปิดปรับปรุงหรือแจ้งเตือนแอปผู้ใช้..."></textarea>
        </div>

        <div class="ios-row">
            <label><i class="fa-solid fa-link"></i> Direct Download URL (GitHub Pages / Releases)</label>
            <div class="input-group-wrapper">
                <input type="text" id="download_url" class="ios-input" placeholder="https://the-genesis-dev.github.io/Update/.ipa" value="https://the-genesis-dev.github.io/Update/.ipa">
                <button type="button" class="input-action-btn" onclick="pasteFromClipboard('download_url')">
                    <i class="fa-solid fa-paste"></i> วาง
                </button>
            </div>
        </div>
    </div>

    <button class="ios-btn" onclick="saveConfigToFirebase()">
        <i class="fa-solid fa-cloud-arrow-up"></i> อัปเดตข้อมูลขึ้น Cloud
    </button>

    <div id="status" class="toast-status"></div>
</div>

<script>
// 🔝 จัดการระบบเปิด/ปิด Sidebar
const sidebarToggle = document.getElementById('sidebarToggle');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

function toggleSidebar() {
    sidebar.classList.toggle('active');
    sidebarOverlay.classList.toggle('active');
    const isOpen = sidebar.classList.contains('active');
    sidebarToggle.innerHTML = isOpen ? `<i class="fa-solid fa-xmark"></i>` : `<i class="fa-solid fa-bars"></i>`;
}

sidebarToggle.addEventListener('click', toggleSidebar);
sidebarOverlay.addEventListener('click', toggleSidebar);

window.onload = function() {
    window.scrollTo(0, 0);
    if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
    }

    startLiveClock();

    const lastSavedCloudTime = localStorage.getItem("last_cloud_save_time");
    if (lastSavedCloudTime) {
        document.getElementById('syncTimeText').innerText = lastSavedCloudTime;
    }

    const savedUrl = localStorage.getItem("firebase_db_url");
    if (savedUrl) {
        document.getElementById("firebase_url").value = savedUrl;
    }
    
    fetchCurrentConfig();
};

function getFullFormattedDateTime() {
    const now = new Date();
    const options = { day: 'numeric', month: 'short', year: 'numeric' };
    const datePart = now.toLocaleDateString('th-TH', options);
    const timePart = now.toLocaleTimeString('th-TH', { hour12: false });
    return `${datePart} - ${timePart}`;
}

function startLiveClock() {
    setInterval(() => {
        document.getElementById('liveClock').innerText = getFullFormattedDateTime();
    }, 1000);
    document.getElementById('liveClock').innerText = getFullFormattedDateTime();
}

function toggleLoading(show, text = "") {
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    if(text) loadingText.innerText = text;
    
    if (show) {
        overlay.classList.add('active');
    } else {
        overlay.classList.remove('active');
    }
}

function showToast(message, type = 'success') {
    const statusDiv = document.getElementById('status');
    if (type === 'success') {
        statusDiv.style.color = "var(--ios-green)";
        statusDiv.style.background = "rgba(48, 209, 88, 0.1)";
        statusDiv.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${message}`;
    } else {
        statusDiv.style.color = "var(--ios-red)";
        statusDiv.style.background = "rgba(255, 69, 58, 0.1)";
        statusDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${message}`;
    }
    statusDiv.classList.add('show');
    setTimeout(() => { statusDiv.classList.remove('show'); }, 3000);
}

async function copyToClipboard(inputId) {
    const inputElement = document.getElementById(inputId);
    if (!inputElement.value.trim()) {
        showToast("ไม่มีข้อความให้คัดลอก", "error");
        return;
    }
    try {
        await navigator.clipboard.writeText(inputElement.value);
        showToast("คัดลอกลง Clipboard แล้ว!", "success");
    } catch (err) {
        showToast("ไม่สามารถคัดลอกได้", "error");
    }
}

async function pasteFromClipboard(inputId) {
    const inputElement = document.getElementById(inputId);
    try {
        const text = await navigator.clipboard.readText();
        if (text) {
            inputElement.value = text;
            showToast("วางข้อความสำเร็จ", "success");
        } else {
            showToast("ไม่มีข้อความใน Clipboard", "error");
        }
    } catch (err) {
        showToast("โปรดอนุญาตสิทธิ์การเข้าถึง Clipboard ของเบราว์เซอร์", "error");
    }
}

function updateStatusPill(type, textLabel) {
    const pill = document.getElementById('db_status_pill');
    const txt = document.getElementById('db_status_text');
    
    if(type === 'success') {
        pill.style.background = 'rgba(48, 209, 88, 0.15)';
        pill.style.color = 'var(--ios-green)';
        pill.style.borderColor = 'rgba(48, 209, 88, 0.2)';
        txt.innerText = textLabel;
    } else if(type === 'error') {
        pill.style.background = 'rgba(255, 69, 58, 0.15)';
        pill.style.color = 'var(--ios-red)';
        pill.style.borderColor = 'rgba(255, 69, 58, 0.2)';
        txt.innerText = textLabel;
    } else {
        pill.style.background = 'rgba(142, 142, 147, 0.15)';
        pill.style.color = 'var(--text-sub)';
        pill.style.borderColor = 'rgba(142, 142, 147, 0.2)';
        txt.innerText = textLabel;
    }
}

async function fetchCurrentConfig() {
    let firebaseUrl = document.getElementById('firebase_url').value.trim();
    if (!firebaseUrl) return;
    if (firebaseUrl.endsWith('/')) firebaseUrl = firebaseUrl.slice(0, -1);

    const headerArea = document.getElementById('headerTitleArea');
    headerArea.classList.add('is-loading');
    toggleLoading(true, "กำลังซิงค์ข้อมูลล่าสุด...");

    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const response = await fetch(`${firebaseUrl}/.json`, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        const data = await response.json();
        if (data) {
            document.getElementById('current_build_id').value = data.current_build_id || '';
            document.getElementById('latest_version').value = data.latest_version || '';
            document.getElementById('message').value = data.message || '';
            document.getElementById('download_url').value = data.download_url || '';
            
            updateStatusPill('success', 'เชื่อมต่อสำเร็จ');
            localStorage.setItem("firebase_db_url", firebaseUrl);
        } else {
            updateStatusPill('success', 'ฐานข้อมูลว่างเปล่า');
        }
    } catch (err) {
        updateStatusPill('error', 'เชื่อมต่อล้มเหลว');
        console.error(err);
    } finally {
        toggleLoading(false);
        headerArea.classList.remove('is-loading');
    }
}

// 🔍 ฟังก์ชันแกะโครงสร้างโดเมน GitHub และ Auto-Detect หาไฟล์นามสกุล .ipa
async function autoDetectIpaFile(inputUrl) {
    // ตรวจสอบว่าในลิงก์มีจุดลงท้ายเป็น /.ipa หรือไม่
    if (!inputUrl.includes('/.ipa')) {
        return inputUrl; // ถ้ากรอกมาปกติ ให้ส่งค่าเดิมกลับไปทำงานทันที
    }

    try {
        // แยกโครงสร้าง URL เช่น https://the-genesis-dev.github.io/Update/.ipa
        const urlObj = new URL(inputUrl);
        const hostParts = urlObj.hostname.split('.');
        const owner = hostParts[0]; // ดึงชื่อเจ้าของ: the-genesis-dev
        
        const pathSegments = urlObj.pathname.split('/').filter(p => p !== '');
        if (pathSegments.length === 0) return inputUrl;
        
        const repo = pathSegments[0]; // ดึงชื่อคลังเก็บโค้ด: Update

        // สร้าง URL สำหรับเรียกดูข้อมูลรายการไฟล์ผ่าน GitHub API (สแกนหาไฟล์ที่ Root Repository)
        const githubApiUrl = `https://api.github.com/repos/${owner}/${repo}/contents`;
        
        // แนบ PAT ล่าสุดจาก LocalStorage เผื่อใช้กรณีเพื่อเลี่ยง Rate Limit API
        const savedToken = localStorage.getItem('gh_token');
        const headers = {};
        if (savedToken) headers['Authorization'] = `token ${savedToken}`;

        const res = await fetch(githubApiUrl, { headers });
        if (!res.ok) throw new Error('ไม่สามารถเข้าถึง GitHub Contents API ได้');
        
        const files = await res.json();
        // ค้นหาไฟล์แรกสุดที่ลงท้ายด้วยนามสกุล .ipa
        const ipaFile = files.find(file => file.name.toLowerCase().endsWith('.ipa'));
        
        if (ipaFile) {
            // ประกอบร่าง URL คืนค่าแบบเต็ม เช่น https://the-genesis-dev.github.io/Update/260611.ipa
            return `https://${owner}.github.io/${repo}/${ipaFile.name}`;
        } else {
            showToast("ไม่พบไฟล์ .ipa ในคลังระบบ", "error");
            return inputUrl;
        }
    } catch (err) {
        console.error("Auto-Detect Error:", err);
        showToast("Auto-Detect ล้มเหลว จะใช้ค่า URL เดิม", "error");
        return inputUrl;
    }
}

async function saveConfigToFirebase() {
    let firebaseUrl = document.getElementById('firebase_url').value.trim();
    const currentBuildId = document.getElementById('current_build_id').value.trim();
    const latestVersion = document.getElementById('latest_version').value.trim();
    const message = document.getElementById('message').value;
    let downloadUrl = document.getElementById('download_url').value.trim();

    if (!firebaseUrl || !currentBuildId || !latestVersion) {
        alert("กรุณากรอกข้อมูลสำคัญให้ครบ: URL, รหัสบิลด์ และเลขเวอร์ชัน");
        return;
    }

    if (firebaseUrl.endsWith('/')) firebaseUrl = firebaseUrl.slice(0, -1);

    toggleLoading(true, "กำลังเปิดระบบสแกนหาไฟล์อัปเดตอัตโนมัติ...");

    // ทำการสแกนหาไฟล์ .ipa บนคลังเซิร์ฟเวอร์จริงก่อนส่งขึ้น Firebase
    downloadUrl = await autoDetectIpaFile(downloadUrl);
    // แสดงชื่อไฟล์เต็มที่หาเจอลงในช่อง Input เพื่อให้ผู้ใช้มองเห็นความคืบหน้า
    document.getElementById('download_url').value = downloadUrl;

    toggleLoading(true, "กำลังอัปโหลดขึ้น Cloud...");

    const configData = {
        current_build_id: currentBuildId,
        latest_version: latestVersion,
        message: message,
        download_url: downloadUrl
    };

    try {
        const response = await fetch(`${firebaseUrl}/.json`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(configData)
        });

        if (response.ok) {
            showToast("บันทึกและปล่อยแพตช์อัปเดตสำเร็จ!", "success");
            updateStatusPill('success', 'อัปเดตแล้ว');

            const timestampNow = getFullFormattedDateTime();
            localStorage.setItem("last_cloud_save_time", timestampNow);
            document.getElementById('syncTimeText').innerText = timestampNow;
        } else {
            throw new Error();
        }
    } catch (err) {
        showToast("เกิดข้อผิดพลาด ไม่สามารถส่งข้อมูลได้", "error");
        updateStatusPill('error', 'อัปเดตล้มเหลว');
    } finally {
        toggleLoading(false);
    }
}
</script>
